<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FlightOps</title>
  <style>
    body {
      font-family: Segoe UI, Arial, sans-serif;
      margin: 0;
      background: #f4f7fb;
      color: #10243f;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
    }
    .card {
      width: min(640px, 95vw);
      background: #fff;
      border: 1px solid #d7e1ee;
      border-radius: 12px;
      padding: 20px;
    }
    h1 { margin: 0 0 10px; font-size: 3rem; }
    a.btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 10px;
      padding: 12px 16px;
      background: #0f62fe;
      color: #fff;
      font-weight: 700;
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
</head>
<body>
  <section class="card">
    <h1>FlightOps</h1>
    <a class="btn" href="https://api.flightops.co.nz/dashboard">Open Bookings Dashboard</a>
  </section>
</body>
</html>
